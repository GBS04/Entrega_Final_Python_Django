{% extends 'base.html' %}

{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<h1>{{ page.title }}</h1>
{% if page.image %}
<img src="{{ page.image.url }}" class="img-fluid mb-3" alt="{{ page.title }}">
{% endif %}
<div>{{ page.content|safe }}</div>
<p><small>By {{ page.author }} on {{ page.date_created }}</small></p>
<a href="{% url 'page_list' %}" class="btn btn-secondary">Back to Pages</a>
{% endblock %}
