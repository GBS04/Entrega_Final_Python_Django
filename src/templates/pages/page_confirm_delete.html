{% extends 'base.html' %}

{% block title %}Delete Page{% endblock %}

{% block content %}
<h1>Delete Page</h1>
<p>Are you sure you want to delete "{{ page.title }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'page_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
