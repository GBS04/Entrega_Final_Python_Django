{% extends 'base.html' %}

{% block title %}{% if object %}Edit{% else %}Create{% endif %} Page{% endblock %}

{% block content %}
<h1>{% if object %}Edit{% else %}Create{% endif %} Page</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
</form>
<a href="{% url 'page_list' %}" class="btn btn-secondary">Cancel</a>
{% endblock %}
