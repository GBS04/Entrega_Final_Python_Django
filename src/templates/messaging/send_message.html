{% extends 'base.html' %}

{% block title %}Send Message{% endblock %}

{% block content %}
<h1>Send Message</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Send</button>
</form>
<a href="{% url 'inbox' %}" class="btn btn-secondary">Cancel</a>
{% endblock %}
